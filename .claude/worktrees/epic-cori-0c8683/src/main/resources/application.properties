spring.application.name=orcamento

# Banco H2 in-memory (desenvolvimento local)
# O banco é criado do zero a cada startup e zerado quando o servidor para
spring.datasource.url=jdbc:h2:mem:orcamento
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Mostra o SQL gerado pelo Hibernate no console (útil para aprendizado)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console: acesse http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:orcamento  |  User: sa  |  Password: (vazio)
spring.h2.console.enabled=true
