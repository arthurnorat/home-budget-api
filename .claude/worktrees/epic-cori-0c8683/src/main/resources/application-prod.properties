# Configuração de produção (Render + Neon)
# As variáveis PGHOST, PGPORT, PGDATABASE, PGUSER e PGPASSWORD são configuradas
# manualmente nas variáveis de ambiente do Render, com os valores do Neon
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.jpa.show-sql=false
